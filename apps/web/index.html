<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veylin</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #0b0d12;
        color: #e6e8ee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: opacity 0.45s ease;
      }
      #splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash-mark {
        width: 76px;
        height: 76px;
        animation: splash-float 2.4s ease-in-out infinite;
      }
      #splash .splash-name {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        opacity: 0.92;
      }
      #splash .splash-bar {
        width: 132px;
        height: 3px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.1);
      }
      #splash .splash-bar > span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: linear-gradient(90deg, #6366f1, #a855f7);
        animation: splash-slide 1.1s ease-in-out infinite;
      }
      #splash .splash-hint {
        font-size: 11px;
        color: rgba(230, 232, 238, 0.5);
        margin-top: -8px;
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @keyframes splash-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(360%); }
      }
      @media (prefers-color-scheme: light) {
        #splash { background: #f7f8fb; color: #1f2330; }
        #splash .splash-bar { background: rgba(0, 0, 0, 0.08); }
        #splash .splash-hint { color: rgba(31, 35, 48, 0.5); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <svg class="splash-mark" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="splashGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1" />
            <stop offset="1" stop-color="#a855f7" />
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="88" height="88" rx="24" stroke="url(#splashGrad)" stroke-width="6" />
        <path d="M30 34L50 70L70 34" stroke="url(#splashGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <div class="splash-name">Veylin</div>
      <div class="splash-bar"><span></span></div>
      <div class="splash-hint" id="splash-hint">正在启动本地服务…</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
