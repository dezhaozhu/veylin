<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veylin</title>
    <style>
      /* Match apps/web/src/index.css --background (:root / .dark) */
      html, body {
        margin: 0;
        background: oklch(1 0 0);
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: oklch(1 0 0);
        color: oklch(0.141 0.005 285.823);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: opacity 0.45s ease;
      }
      #splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash-mark-wrap {
        position: relative;
        width: 112px;
        height: 112px;
        display: grid;
        place-items: center;
      }
      #splash .splash-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1.5px solid oklch(0.552 0.016 285.938 / 0.22);
        border-top-color: oklch(0.141 0.005 285.823 / 0.72);
        animation: splash-spin 1.1s linear infinite;
      }
      #splash .splash-mark {
        width: 72px;
        height: 72px;
        object-fit: contain;
        /* white asset → dark mark on light app background */
        filter: invert(1);
        animation: splash-breathe 1.8s ease-in-out infinite;
        will-change: transform, opacity;
      }
      #splash .splash-hint {
        font-size: 11px;
        color: oklch(0.552 0.016 285.938);
        min-height: 1em;
        text-align: center;
        max-width: 280px;
      }
      #splash .splash-hint:empty {
        display: none;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); opacity: 0.72; }
        50% { transform: scale(1.06); opacity: 1; }
      }
      /* App theme is class-based (.dark); keep splash in sync when that class appears */
      html.dark, html.dark body {
        background: oklch(0.141 0.005 285.823);
      }
      html.dark #splash {
        background: oklch(0.141 0.005 285.823);
        color: oklch(0.985 0 0);
      }
      html.dark #splash .splash-mark { filter: none; }
      html.dark #splash .splash-ring {
        border-color: oklch(0.705 0.015 286.067 / 0.22);
        border-top-color: oklch(0.985 0 0 / 0.78);
      }
      html.dark #splash .splash-hint { color: oklch(0.705 0.015 286.067); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <div class="splash-mark-wrap" aria-hidden="true">
        <span class="splash-ring"></span>
        <img
          class="splash-mark"
          src="/splash-logo.png"
          width="72"
          height="72"
          alt=""
          draggable="false"
        />
      </div>
      <div class="splash-hint" id="splash-hint"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
