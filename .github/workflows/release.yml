name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  notes:
    name: Release notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.gen.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        id: gen
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PREV=$(git tag -l 'v*' --sort=-v:refname | awk -v t="$TAG" '$0 != t { print; exit }')
          {
            echo "## What's changed"
            echo
            if [ -n "${PREV:-}" ]; then
              RANGE="${PREV}..${TAG}"
              COMMITS=$(git log "$RANGE" --pretty=format:'- %s' --reverse)
              FILTERED=$(printf '%s\n' "$COMMITS" | grep -v -E '^- chore: bump desktop to v' || true)
              if [ -n "$FILTERED" ]; then
                printf '%s\n' "$FILTERED"
              elif [ -n "$COMMITS" ]; then
                printf '%s\n' "$COMMITS"
              else
                echo "- No commits since \`${PREV}\`."
              fi
            else
              git log -30 --pretty=format:'- %s' --reverse
              echo
            fi
          } > /tmp/release-body.md

          echo "Generated release notes:"
          cat /tmp/release-body.md

          {
            echo "body<<RELEASE_BODY_EOF"
            cat /tmp/release-body.md
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Build desktop (${{ matrix.platform }})
    needs: [gate, notes]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            targetTriple: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            targetTriple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: '--target x86_64-unknown-linux-gnu --bundles deb,appimage --verbose'
            targetTriple: x86_64-unknown-linux-gnu
            noStrip: true
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            targetTriple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targetTriple }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Build and release the desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          CI: true
          CARGO_BUILD_TARGET: ${{ matrix.targetTriple }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: ${{ matrix.noStrip && 'true' || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Veylin ${{ github.ref_name }}'
          releaseBody: ${{ needs.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
