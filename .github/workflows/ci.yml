name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run -w @veylin/web test:e2e:install

      - name: E2E tests
        run: npm run -w @veylin/web test:e2e
        env:
          VEYLIN_DESKTOP_AUTH: '1'
          VEYLIN_DATA_DIR: ./data
          VEYLIN_SKIP_SIDECAR: '1'
          VEYLIN_LAZY_MCP_BOOT: '1'
