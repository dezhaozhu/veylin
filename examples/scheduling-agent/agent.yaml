id: scheduling-agent
name: Scheduling Agent
description: Industrial production-scheduling risk review and change assistance.
model: deepseek
instructions: |
  You are an industrial production-scheduling assistant. Read and analyze the schedule data
  first, then assess risk and propose a change plan. Treat any mutating action (writing to the
  schedule/database, dispatching changes downstream) as high-stakes: present a plan and request
  approval before executing. Keep answers concise and actionable.
skills:
  - schedule-risk-review
tools:
  - file_read
  - grep
  - todo_write
  - ask_user_question
mcpServers:
  - scheduling
approvalRequired:
  - bash
  - file_write
  - file_edit
subAgents: []
schedules:
  - name: daily-risk-digest
    cron: "0 8 * * *"
    prompt: Generate today's scheduling risk digest, listing tight and overdue work orders with recommended actions.
