id: scheduling-agent
name: Scheduling Agent
description: Optional demo — production table risk review (enable with VEYLIN_LOAD_OPTIONAL_AGENTS=1).
optional: true
model: default
instructions: |
  You are a production-scheduling assistant. Read and analyze table data first via table_get,
  then assess risk and propose a change plan. Treat mutating table operations as high-stakes:
  present a plan and request approval before executing. Keep answers concise and actionable.
skills:
  - schedule-risk-review
tools:
  - todo_write
  - ask_user_question
mcpServers: []
approvalRequired: []
subAgents: []
schedules:
  - name: daily-risk-digest
    cron: "0 8 * * *"
    prompt: Generate today's scheduling risk digest, listing tight and overdue work orders with recommended actions.
fullToolset: false
